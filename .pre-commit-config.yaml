repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        files: ^app/
        additional_dependencies:
          - celery-types
          - pydantic
          - types-redis
          - elasticsearch[async]
          - fastapi
          - pymongo
          - slowapi
          - starlette
