services:
  test:
    build: .
    command: uv run pytest tests/ -m integration -v
    environment:
      - MONGODB_URL=mongodb://root:test@mongo:27017/?authSource=admin
      - REDIS_URL=redis://:test@redis:6379/0
      - ELASTICSEARCH_URL=http://elastic:test@elasticsearch:9200
      - HMAC_SECRET=test-secret
    volumes:
      - ./tests:/code/tests
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  mongo:
    image: mongo:8
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=test
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    tmpfs:
      - /data/db

  redis:
    image: redis:8-alpine
    command: redis-server --requirepass test
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "test", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: elasticsearch:9.3.1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - ELASTIC_PASSWORD=test
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:test http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    tmpfs:
      - /usr/share/elasticsearch/data
